version: 1.0
runtime: nodejs22
build:
  commands:
    build:
      - npm install
run:
  command: node server.mjs
  env:
    - name: S3_BUCKET
      value: hogehoge1
    - name: AWS_REGION
      value: ap-northeast-1
    - name: S3_PREFIX
      value: invoices
    - name: PUBLIC_BASE_URL
      value: https://hogehoge2.ap-northeast-1.awsapprunner.com/
    - name: PDF_FONT_PATH
      value: /app/fonts/NotoSansJP-Regular.ttf
    - name: OPENAI_API_KEY
      value: hogehoge3
    - name: BASIC_AUTH_USER
      value: hogehoge4
    - name: BASIC_AUTH_PASS
      value: hogehoge5
  network:
    port: 8080
    env: PORT